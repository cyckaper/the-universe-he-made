# Netlify configuration — static site, no build step needed.
[build]
  publish = "."

# Long-lived cache for static assets (the fonts/css/js rarely change).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Always revalidate the HTML so updates show immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
